<h2>批量 SEO 编辑器 — 首页布局</h2>
<p class="subtitle">首先选择你要编辑的资源类型</p>

<div class="mockup" style="margin-top: 2rem;">
  <div class="mockup-header">选择资源类型</div>
  <div class="mockup-body" style="padding: 1.5rem;">
    <div class="options">
      <div class="option" data-choice="products" onclick="toggleSelect(this)">
        <div class="letter">📦</div>
        <div class="content">
          <h3>产品 (Products)</h3>
          <p>批量编辑产品的 Meta Title / Description</p>
        </div>
      </div>
      <div class="option" data-choice="collections" onclick="toggleSelect(this)">
        <div class="letter">📁</div>
        <div class="content">
          <h3>产品系列 (Collections)</h3>
          <p>批量编辑产品系列的 SEO 信息</p>
        </div>
      </div>
      <div class="option" data-choice="pages" onclick="toggleSelect(this)">
        <div class="letter">📄</div>
        <div class="content">
          <h3>页面 (Pages)</h3>
          <p>批量编辑自定义页面的 SEO 信息</p>
        </div>
      </div>
      <div class="option" data-choice="blogs" onclick="toggleSelect(this)">
        <div class="letter">✍️</div>
        <div class="content">
          <h3>博客文章 (Blog Articles)</h3>
          <p>批量编辑博客文章的 SEO 信息</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 2rem;">
  <p class="subtitle">你可以选择多个类型，我们会在一个界面中管理</p>
</div>
